name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
      - name: Run unit and contract tests
        run: pytest -q tests --ignore=tests/test_smoke_runs.py

  smoke:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
      - name: Run experiment smoke tests
        env:
          GHOSTS_RUN_SMOKE: "1"
        run: pytest -q tests/test_smoke_runs.py

  notebooks:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
          python -m pip install nbconvert jupyter ipykernel
      - name: Execute notebooks
        run: |
          mkdir -p /tmp/notebooks
          jupyter nbconvert --to notebook --execute tutorials/00_step_controller_intro.ipynb --output /tmp/notebooks/00_step_controller_intro.executed.ipynb
          jupyter nbconvert --to notebook --execute tutorials/01_adam_controller.ipynb --output /tmp/notebooks/01_adam_controller.executed.ipynb
          jupyter nbconvert --to notebook --execute tutorials/02_momentum_controller.ipynb --output /tmp/notebooks/02_momentum_controller.executed.ipynb
          jupyter nbconvert --to notebook --execute tutorials/03_binary_radius.ipynb --output /tmp/notebooks/03_binary_radius.executed.ipynb
          jupyter nbconvert --to notebook --execute tutorials/04_kl_bound.ipynb --output /tmp/notebooks/04_kl_bound.executed.ipynb
