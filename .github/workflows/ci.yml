name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
      - name: Run unit and contract tests
        run: pytest -q tests --ignore=tests/test_smoke_runs.py

  smoke:
    runs-on: ubuntu-latest
    needs: tests
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
      - name: Run experiment smoke tests
        env:
          GHOSTS_RUN_SMOKE: "1"
        run: pytest -q tests/test_smoke_runs.py

  notebooks:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install --no-build-isolation -e .
          python -m pip install nbconvert jupyter ipykernel
      - name: Execute and convert notebooks to HTML
        run: |
          mkdir -p docs/tutorials
          for nb in tutorials/*.ipynb; do
            name=$(basename "$nb" .ipynb)
            jupyter nbconvert --to html --execute "$nb" --output-dir docs/tutorials --output "$name.html"
          done
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: notebooks
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
